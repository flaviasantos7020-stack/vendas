<section class="home-section">
  <div class="home-section__header">
    <h2>Naninhas</h2>
    <a routerLink="/produtos" [queryParams]="{ categoria: 'naninha' }">Ver todas</a>
  </div>
  <div class="home-section__grid">
    @if (loading()) {
      <p>Carregando produtos...</p>
    } @else {
      @for (product of naninhas(); track product.id) {
        <app-product-card [product]="product" />
      }
    }
  </div>
</section>
